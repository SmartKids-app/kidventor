<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Arena | Kidventor Academy</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <link rel="icon" type="image/png" href="image/favicon.png">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #f1f5f9;
        }

        .option-btn {
            transition: all 0.2s ease;
            border: 2px solid #e2e8f0;
        }

        .option-btn:hover {
            border-color: #0284c7;
            background: #f0f9ff;
            transform: scale(1.02);
        }

        .correct {
            background: #dcfce7 !important;
            border-color: #22c55e !important;
            color: #166534;
        }

        .wrong {
            background: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Responsive Navbar -->
    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-slate-100 py-4 px-4 sm:px-6 shadow-sm w-full">
        <div class="max-w-6xl mx-auto flex justify-between items-center">

            <!-- Logo -->
            <a href="index.html" class="flex items-center gap-3 group relative">
                <div class="absolute -inset-2 bg-sky-500/20 rounded-full blur-xl opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>

                <img 
                    src="https://raw.githubusercontent.com/SmartKids-app/kidventor/main/image/Logo_kiventor.png" 
                    alt="Kidventor Logo"
                    class="w-11 h-11 object-contain rounded-xl relative z-10 group-hover:scale-110 transition-transform duration-500"
                >

                <span class="font-extrabold tracking-tight uppercase text-sm text-slate-800 relative z-10 group-hover:text-sky-600 transition-colors">
                    Kidventor
                </span>
            </a>

            <!-- Desktop Menu -->
            <div class="hidden md:flex items-center gap-6 text-[11px] font-black uppercase tracking-widest text-slate-500">
                <a href="index.html" class="hover:text-sky-600 transition">Home</a>
                <a href="lessons.html" class="hover:text-sky-600 transition">Lessons</a>
                <a href="worksheet.html" class="hover:text-sky-600 transition">Worksheets</a>
                <a href="about.html" class="hover:text-sky-600 transition">About</a>
            </div>

            <!-- Mobile Menu Button -->
            <button 
                id="mobile-menu-btn"
                class="md:hidden flex items-center justify-center w-10 h-10 rounded-xl bg-slate-100 hover:bg-slate-200 transition duration-300"
            >
                <svg 
                    id="menu-icon"
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-5 h-5 text-slate-700"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke="currentColor"
                >
                    <path 
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M4 6h16M4 12h16M4 18h16"
                    />
                </svg>
            </button>
        </div>

        <!-- Mobile Dropdown -->
        <div 
            id="mobile-menu"
            class="md:hidden overflow-hidden max-h-0 opacity-0 transition-all duration-500 ease-in-out"
        >
            <div class="pt-4 pb-4 border-t border-slate-100 mt-4 space-y-4">
                <a href="index.html" class="block font-bold text-slate-700 hover:text-sky-600 transition">Home</a>
                <a href="lessons.html" class="block font-bold text-slate-700 hover:text-sky-600 transition">Lessons</a>
                <a href="worksheet.html" class="block font-bold text-slate-700 hover:text-sky-600 transition">Worksheets</a>
                <a href="about.html" class="block font-bold text-slate-700 hover:text-sky-600 transition">About</a>
            </div>
        </div>
    </nav>

    <!-- Your Loader + Quiz UI continues here -->
