<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Practice Hub | SmartKids Learning</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Fixed Animation Logic */
    .accordion-body { 
      max-height: 0; 
      overflow: hidden; 
      transition: max-height 0.5s ease-in-out, opacity 0.3s ease;
      opacity: 0;
    }
    .accordion-body.is-open { 
      max-height: 1000px; /* Big enough to hold content */
      opacity: 1;
    }
    .rotate-icon { transition: transform 0.3s ease; }
    .lesson-btn:hover { transform: translateX(8px); }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

  <nav class="bg-white border-b py-4 px-6 sticky top-0 z-50 shadow-sm">
    <div class="max-w-5xl mx-auto flex justify-between items-center">
      <a href="../index.html" class="flex items-center gap-2">
        <div class="w-8 h-8 bg-orange-600 rounded-lg flex items-center justify-center text-white font-bold">SK</div>
        <span class="font-bold text-xl tracking-tight text-slate-800">SmartKids</span>
      </a>
      <a href="../lessons.html" class="text-sm font-semibold text-orange-600">← All Lessons</a>
    </div>
  </nav>

  <header class="bg-gradient-to-b from-orange-500 to-red-600 text-white py-16 px-6 text-center">
    <div class="max-w-3xl mx-auto">
      <div class="inline-block bg-orange-400/30 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-widest mb-4 text-white">Typing Skills</div>
      <h1 class="text-4xl md:text-5xl font-extrabold mb-4">Master Your Keyboard</h1>
      <p class="text-orange-50 text-lg">From finding letters to professional coding speed—start your typing journey here.</p>
    </div>
  </header>

  <main class="max-w-4xl mx-auto py-12 px-6 min-h-screen">
    <div id="accordion" class="space-y-4">
      </div>
  </main>

  <footer class="bg-slate-900 text-slate-400 py-12 px-4 mt-20">
    <div class="max-w-5xl mx-auto text-center md:text-left">
      <div class="h-5">
        <p id="footer-typing" class="text-sm font-mono text-blue-400"></p>
      </div>
    </div>
  </footer>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const container = document.getElementById("accordion");
      
      const years = [
        {id:"year1", name:"Year 1", topics:["Keyboard Geography","Finding Letters","Alphabet Map"]},
        {id:"year2", name:"Year 2", topics:["Home Row Mastery","ASDF JKL; Keys","Middle Row Reach"]},
        {id:"year3", name:"Year 3", topics:["Top Row Keys","QWERTY Reach","Upward Finger Stretch"]},
        {id:"year4", name:"Year 4", topics:["Bottom Row Keys","ZXCVB Reach","Downward Finger Stretch"]},
        {id:"year5", name:"Year 5", topics:["The Spacebar","Backspace Eraser","The Enter Key"]},
        {id:"year6", name:"Year 6", topics:["Shift Key Mastery","Capital Letters","Basic Symbols"]},
        {id:"year7", name:"Year 7", topics:["Punctuation Marks","The Number Row","Common Symbols"]},
        {id:"year8", name:"Year 8", topics:["WPM Speed Intro","Accuracy Drills","Common Word Typing"]},
        {id:"year9", name:"Year 9", topics:["Keyboard Shortcuts","Ctrl+C / Ctrl+V","Undo & Redo"]},
        {id:"year10", name:"Year 10", topics:["Paragraph Typing","Text Formatting","High-Speed Focus"]},
        {id:"year11", name:"Year 11", topics:["System Navigation","Tab & Escape Keys","Alt-Tab Multitasking"]},
        {id:"year12", name:"Year 12", topics:["Command Line Typing","Developer Symbols","Final Speed Test"]},
        {id:"graduation", name:"🎓 GRADUATION", topics:["Full Speed Assessment","Certificate Generation","Course Summary"], isSpecial: true}
      ];

      years.forEach(year => {
        const card = document.createElement("div");
        card.className = `bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden ${year.isSpecial ? 'border-amber-400 ring-1 ring-amber-100' : ''}`;

        const header = document.createElement("button");
        const iconBg = year.isSpecial ? "bg-amber-100 text-amber-600" : "bg-orange-100 text-orange-600";
        
        header.className = "w-full flex justify-between items-center px-6 py-5 text-lg font-bold text-slate-700 hover:bg-slate-50 transition-colors";
        header.innerHTML = `
          <span class="flex items-center gap-3">
            <span class="w-8 h-8 ${iconBg} rounded-full text-xs flex items-center justify-center font-bold">
              ${year.isSpecial ? '★' : year.id.replace('year','')}
            </span>
            ${year.name}
          </span>
          <span class="rotate-icon text-slate-400 font-light text-2xl">+</span>
        `;

        const body = document.createElement("div");
        body.className = "accordion-body bg-slate-50 px-6"; // REMOVED "hidden"

        body.innerHTML = `
          <div class="py-4 grid gap-3">
            ${year.topics.map(topic => `
              <a href="keyboard/${year.id === 'graduation' ? 'graduation' : year.id}.html" class="lesson-btn flex items-center gap-3 p-4 bg-white rounded-xl border border-slate-100 shadow-sm hover:border-orange-300 transition-all group">
                <span class="text-xl">${year.isSpecial ? '🏆' : '⌨️'}</span>
                <span class="text-sm font-semibold text-slate-700 group-hover:text-orange-600">${topic}</span>
              </a>
            `).join("")}
          </div>
        `;

        header.addEventListener("click", () => {
          const isOpen = body.classList.contains('is-open');
          
          // Close all others
          document.querySelectorAll('.accordion-body').forEach(b => b.classList.remove('is-open'));
          document.querySelectorAll('.rotate-icon').forEach(i => i.style.transform = 'rotate(0deg)');
          
          // Open clicked one if it was closed
          if (!isOpen) {
            body.classList.add('is-open');
            header.querySelector('.rotate-icon').style.transform = 'rotate(45deg)';
          }
        });

        card.appendChild(header);
        card.appendChild(body);
        container.appendChild(card);
      });

      // Typing animation
      const footerMsg = "Empowering the next generation of African tech leaders.";
      let charIdx = 0;
      const type = () => {
        const el = document.getElementById("footer-typing");
        if (charIdx < footerMsg.length) {
          el.innerHTML += footerMsg.charAt(charIdx);
          charIdx++;
          setTimeout(type, 70);
        } else {
          setTimeout(() => { el.innerHTML = ""; charIdx = 0; type(); }, 5000);
        }
      };
      type();
    });
  </script>
</body>
</html>
