<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Year 1: My First Email | SmartKids</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-indigo-50 min-h-screen p-6 font-sans">

  <div class="max-w-3xl mx-auto">
    <header class="text-center mb-8">
      <h1 class="text-4xl font-black text-indigo-900">The Digital Post Office</h1>
      <p class="text-indigo-600 mt-2">Mission: Send a "Thank You" email to Teacher Sarah!</p>
    </header>

    <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-4 border-white">
      <div class="bg-slate-100 p-4 border-b flex gap-2">
        <div class="w-3 h-3 rounded-full bg-red-400"></div>
        <div class="w-3 h-3 rounded-full bg-yellow-400"></div>
        <div class="w-3 h-3 rounded-full bg-green-400"></div>
      </div>

      <div class="p-8 space-y-6">
        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase mb-2">To:</label>
          <input type="text" id="emailTo" placeholder="teacher.sarah@smartkids.com" 
                 class="w-full p-3 rounded-xl border-2 border-slate-100 focus:border-indigo-500 outline-none transition font-semibold">
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Subject:</label>
          <input type="text" id="emailSubject" placeholder="What is this about?" 
                 class="w-full p-3 rounded-xl border-2 border-slate-100 focus:border-indigo-500 outline-none transition font-semibold">
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Message:</label>
          <textarea id="emailMessage" rows="5" placeholder="Write your polite message here..." 
                    class="w-full p-4 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 outline-none transition"></textarea>
        </div>

        <button onclick="checkEmail()" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl hover:bg-indigo-700 transition-all shadow-lg active:scale-95">
          🚀 SEND EMAIL
        </button>
      </div>
    </div>

    <div id="feedback" class="mt-8 text-center hidden">
        <div class="bg-green-500 text-white p-6 rounded-3xl inline-block shadow-xl animate-bounce">
            <h2 class="text-2xl font-bold">Mail Delivered! ✅</h2>
            <p>Teacher Sarah will be so happy!</p>
        </div>
        <div class="mt-6">
            <button onclick="window.location.href='../../lessons.html'" class="text-indigo-600 font-bold underline">Back to Curriculum</button>
        </div>
    </div>
  </div>

  <script>
    function checkEmail() {
      const to = document.getElementById('emailTo').value.toLowerCase();
      const subject = document.getElementById('emailSubject').value;
      const msg = document.getElementById('emailMessage').value;

      if (to === "teacher.sarah@smartkids.com" && subject.length > 3 && msg.length > 5) {
        document.getElementById('feedback').classList.remove('hidden');
        // Scroll to feedback
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      } else {
        alert("Check your address! Make sure it's: teacher.sarah@smartkids.com and you've written a subject and message.");
      }
    }
  </script>
</body>
</html>
