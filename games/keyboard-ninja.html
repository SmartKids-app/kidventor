<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Keyboard Ninja Pro | Kidventor</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
    body {
        margin: 0;
        overflow: hidden;
        font-family: 'Inter', system-ui, sans-serif;
        background: radial-gradient(circle at center, #1e1b4b, #0f172a);
    }

    /* Upgraded Letter Style */
    .letter {
        position: absolute;
        width: 70px;
        height: 70px;
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        font-weight: 900;
        color: #fff;
        background: linear-gradient(135deg, #6366f1, #4338ca);
        box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 -4px 0 rgba(0,0,0,0.2);
        user-select: none;
        border: 2px solid rgba(255,255,255,0.1);
    }

    /* Slash Effect */
    .slash {
        position: absolute;
        height: 4px;
        background: white;
        border-radius: 2px;
        transform: rotate(-45deg);
        pointer-events: none;
        animation: slashAnim 0.3s ease-out forwards;
    }

    @keyframes slashAnim {
        0% { width: 0; opacity: 1; }
        100% { width: 150px; opacity: 0; }
    }

    .hit {
        transform: scale(0);
        opacity: 0;
        transition: all 0.2s ease-out;
    }

    .panel {
        backdrop-filter: blur(12px);
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    /* Floating Animation for Start Text */
    .floating { animation: float 3s ease-in-out infinite; }
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-20px); }
    }
</style>
</head>

<body>

<div class="fixed top-0 inset-x-0 z-50 px-6 py-6">
    <div class="content-container max-w-5xl mx-auto flex justify-between items-center">
        <div class="flex gap-4">
            <div class="panel px-6 py-3 rounded-2xl text-white">
                <p class="text-[10px] uppercase font-black tracking-widest text-indigo-300">Score</p>
                <p id="score" class="text-3xl font-black">0</p>
            </div>
            <div class="panel px-6 py-3 rounded-2xl text-white">
                <p class="text-[10px] uppercase font-black tracking-widest text-emerald-300">Stars</p>
                <p id="currentStars" class="text-3xl font-black text-amber-400">0</p>
            </div>
        </div>

        <div id="comboContainer" class="hidden text-center">
            <p id="comboText" class="text-4xl font-black text-white italic italic">X2</p>
            <p class="text-[10px] font-black text-indigo-400 uppercase">Combo</p>
        </div>

        <div class="flex gap-4">
            <div class="panel px-6 py-3 rounded-2xl text-white text-right">
                <p class="text-[10px] uppercase font-black tracking-widest text-rose-300">Lives</p>
                <p id="lives" class="text-2xl font-black">❤️❤️❤️</p>
            </div>
        </div>
    </div>
</div>

<div id="startScreen" class="absolute inset-0 flex flex-col items-center justify-center z-40 bg-slate-950/40">
    <div class="floating text-center">
        <h1 class="text-white text-7xl font-black tracking-tighter mb-4">KEYBOARD <span class="text-indigo-500">NINJA</span></h1>
        <p class="text-indigo-200 font-bold tracking-[0.3em] animate-pulse uppercase">Press any key to begin mission</p>
    </div>
</div>

<div id="gameArea" class="absolute inset-0"></div>

<div id="gameOver" class="hidden fixed inset-0 z-[100] bg-slate-950/95 flex items-center justify-center p-6">
    <div class="bg-white rounded-[3rem] p-12 max-w-md w-full text-center shadow-2xl">
        <div class="text-6xl mb-6">🏆</div>
        <h2 class="text-4xl font-black text-slate-900 leading-none">Mission Complete</h2>
        <p class="mt-2 text-slate-400 font-medium">You protected the digital scroll!</p>

        <div class="mt-8 space-y-3">
            <div class="bg-slate-50 flex justify-between items-center p-5 rounded-2xl">
                <span class="font-black text-slate-400 uppercase text-xs">Total Score</span>
                <span id="finalScore" class="text-2xl font-black">0</span>
            </div>
            <div class="bg-indigo-600 flex justify-between items-center p-5 rounded-2xl text-white">
                <span class="font-black opacity-80 uppercase text-xs">Stars Earned</span>
                <span id="starsWon" class="text-2xl font-black">0</span>
            </div>
        </div>

        <button onclick="location.reload()" class="mt-8 w-full py-5 rounded-[1.5rem] bg-slate-900 text-white font-black hover:bg-indigo-600 transition-all transform hover:scale-105">
            RETRY MISSION
        </button>
    </div>
</div>

<script>
    const gameArea = document.getElementById("gameArea");
    let score = 0;
    let lives = 3;
    let combo = 0;
    let speed = 2.0;
    let started = false;
    let ended = false;
    let activeLetters = [];

    // Visual Slash Effect
    function triggerSlash(x, y) {
        const slash = document.createElement("div");
        slash.className = "slash";
        slash.style.left = x + "px";
        slash.style.top = y + "px";
        document.body.appendChild(slash);
        setTimeout(() => slash.remove(), 300);
    }

    function updateUI() {
        document.getElementById("score").textContent = score;
        document.getElementById("currentStars").textContent = Math.floor(score / 5);
        
        let hearts = "";
        for(let i=0; i<3; i++) hearts += (i < lives) ? "❤️" : "🖤";
        document.getElementById("lives").textContent = hearts;

        const comboContainer = document.getElementById("comboContainer");
        if (combo > 2) {
            comboContainer.classList.remove("hidden");
            document.getElementById("comboText").textContent = `X${Math.floor(combo/2)}`;
        } else {
            comboContainer.classList.add("hidden");
        }
    }

    function spawnLetter() {
        if (ended || !started) return;
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const char = chars[Math.floor(Math.random() * chars.length)];
        const el = document.createElement("div");
        el.className = "letter";
        el.textContent = char;
        
        // Ensure letters stay within screen bounds
        const x = Math.random() * (window.innerWidth - 100) + 20;
        el.style.left = x + "px";
        el.style.top = "-100px";
        
        gameArea.appendChild(el);
        activeLetters.push({ char, el, x, y: -100 });
        
        // Gradual speed increase
        speed += 0.02;
    }

    function gameLoop() {
        if (ended) return;

        for (let i = activeLetters.length - 1; i >= 0; i--) {
            const item = activeLetters[i];
            item.y += speed;
            item.el.style.top = item.y + "px";

            // If letter falls off screen
            if (item.y > window.innerHeight) {
                item.el.remove();
                activeLetters.splice(i, 1);
                lives--;
                combo = 0;
                updateUI();
                if (lives <= 0) {
                    endGame();
                    return;
                }
            }
        }
        requestAnimationFrame(gameLoop);
    }

    // MAIN INPUT LISTENER
    document.addEventListener("keydown", (e) => {
        // Prevent game from starting on modifier keys like Shift/Alt
        if (e.key.length !== 1 && !started) return;

        // START LOGIC
        if (!started) {
            started = true;
            document.getElementById("startScreen").classList.add("hidden");
            setInterval(spawnLetter, 900);
            updateUI(); // Set initial hearts/score
            gameLoop();
            return;
        }

        if (ended) return;

        const key = e.key.toUpperCase();
        let hitFound = false;

        // Check if hit
        for (let i = 0; i < activeLetters.length; i++) {
            if (activeLetters[i].char === key) {
                const hit = activeLetters[i];
                triggerSlash(hit.x, hit.y + 35);
                hit.el.classList.add("hit");
                
                // Visual cleanup
                const targetEl = hit.el;
                setTimeout(() => targetEl.remove(), 100);
                
                activeLetters.splice(i, 1);
                
                combo++;
                score += (10 * Math.max(1, Math.floor(combo/2)));
                updateUI();
                hitFound = true;
                break;
            }
        }
        
        // Reset combo if player types the wrong letter
        if (!hitFound) {
            combo = 0;
            updateUI();
        }
    });

    function endGame() {
        if (ended) return;
        ended = true;
        document.getElementById("gameOver").classList.remove("hidden");
        document.getElementById("finalScore").textContent = score;
        const totalStars = Math.floor(score / 5);
        document.getElementById("starsWon").textContent = totalStars;
        
        // Save stars to local storage
        let savedStars = Number(localStorage.getItem("kidventorStars")) || 0;
        localStorage.setItem("kidventorStars", savedStars + totalStars);
    }
</script>

</body>
</html>
